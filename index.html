<script>
"use strict";

//////////////////////// AUDIO ////////////////////////
class SFX {
  constructor(){
    this.ctx = null;
  }
  ensure(){
    if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)();
    if(this.ctx.state === 'suspended') this.ctx.resume();
  }
  tone(freq, dur, type='sine', vol=0.2, slideTo=null){
    this.ensure();
    const ctx=this.ctx;
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.type=type;
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime+dur);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+dur);
  }
  noise(dur, vol=0.2){
    this.ensure();
    const ctx=this.ctx;
    const bufferSize = ctx.sampleRate*dur;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i]=(Math.random()*2-1)*(1-i/bufferSize);
    const src = ctx.createBufferSource();
    src.buffer=buffer;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    src.connect(g); g.connect(ctx.destination);
    src.start();
  }
  draw(){ this.tone(180,0.18,'triangle',0.05,260); }
  release(charge){ this.tone(300+charge*400,0.12,'square',0.15,900+charge*600); }
  hit(){ this.noise(0.15,0.25); this.tone(90,0.12,'sawtooth',0.15); }
  parry(){ this.tone(1200,0.08,'sine',0.25,1800); this.noise(0.05,0.15); }
  death(){ this.tone(220,0.5,'sawtooth',0.2,40); }
  respawn(){ this.tone(440,0.3,'sine',0.15,880); }
  victory(){ this.tone(440,0.2,'sine',0.2,660); setTimeout(()=>this.tone(660,0.4,'sine',0.2,880),150); }
  jump(){ this.tone(400,0.08,'sine',0.08,600); }
  land(){ this.tone(150,0.06,'sine',0.06,80); }
}
const audio = new SFX();

//////////////////////// INPUT ////////////////////////
class Input {
  constructor(canvas){
    this.keys = {};
    this.mouse = {x:0,y:0,down:false,rightDown:false};
    this.justPressed = {};
    window.addEventListener('keydown', e=>{
      if(!this.keys[e.code]) this.justPressed[e.code]=true;
      this.keys[e.code]=true;
    });
    window.addEventListener('keyup', e=>{ this.keys[e.code]=false; });
    canvas.addEventListener('mousemove', e=>{
      const r = canvas.getBoundingClientRect();
      this.mouse.x = e.clientX - r.left;
      this.mouse.y = e.clientY - r.top;
    });
    canvas.addEventListener('mousedown', e=>{
      audio.ensure();
      if(e.button===0){ this.mouse.down=true; this.mouse.justDown=true; }
      if(e.button===2){ this.mouse.rightDown=true; this.mouse.rightJust=true; }
    });
    window.addEventListener('mouseup', e=>{
      if(e.button===0){ this.mouse.down=false; this.mouse.justUp=true; }
      if(e.button===2){ this.mouse.rightDown=false; }
    });
    canvas.addEventListener('contextmenu', e=>e.preventDefault());
  }
  consumeFrame(){
    this.justPressed = {};
    this.mouse.justDown=false;
    this.mouse.justUp=false;
    this.mouse.rightJust=false;
  }
}

//////////////////////// PARTICLE ////////////////////////
class Particle {
  constructor(x,y,vx,vy,life,size,fade=true,color='#fff',target=null){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.life=life;this.maxLife=life;this.size=size;this.fade=fade;
    this.color=color;
    this.dead=false;
    this.target=target;
  }
  update(dt){
    if(this.target){
      const tx = this.target.x;
      const ty = this.target.y - this.target.h * 0.55;
      const dx = tx - this.x;
      const dy = ty - this.y;
      const dist = Math.hypot(dx, dy);
      if(dist < 18) {
        this.dead = true;
        return;
      }
      const force = 1600;
      const txv = (dx / dist) * force;
      const tyv = (dy / dist) * force;
      this.vx += (txv - this.vx) * 12 * dt;
      this.vy += (tyv - this.vy) * 12 * dt;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
    } else {
      this.x+=this.vx*dt; this.y+=this.vy*dt;
      this.vy += 400*dt;
      this.vx *= 0.98;
    }
    this.life -= dt;
    if(this.life<=0) this.dead=true;
  }
  draw(ctx, cam){
    const a = this.fade ? Math.max(0,this.life/this.maxLife) : 1;
    ctx.globalAlpha = a*0.9;
    ctx.fillStyle = this.color;
    const sx = this.x - cam.x, sy = this.y - cam.y;
    
    if(this.color !== '#fff' && this.size > 2.5) {
      ctx.shadowColor = this.color;
      ctx.shadowBlur = this.size * 2;
    }
    
    ctx.fillRect(sx-this.size/2, sy-this.size/2, this.size, this.size);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

class ParticleSystem {
  constructor(){ this.particles=[]; }
  burst(x,y,count,speed,life,size){
    for(let i=0;i<count;i++){
      const ang = Math.random()*Math.PI*2;
      const sp = speed*(0.4+Math.random()*0.6);
      this.particles.push(new Particle(x,y,Math.cos(ang)*sp,Math.sin(ang)*sp, life*(0.5+Math.random()*0.5), size*(0.5+Math.random()*0.8)));
    }
  }
  dust(x,y,dir=0){
    for(let i=0;i<6;i++){
      this.particles.push(new Particle(x,y, (Math.random()-0.5)*80, -Math.random()*40, 0.4, 2+Math.random()*2));
    }
  }
  purpleBurst(x,y,count){
    for(let i=0;i<count;i++){
      const ang = Math.random()*Math.PI*2;
      const sp = 18+Math.random()*30;
      this.particles.push(new Particle(
        x,y, Math.cos(ang)*sp, Math.sin(ang)*sp-30,
        0.5+Math.random()*0.4, 2+Math.random()*2.5, true,
        Math.random()<0.5 ? 'rgba(190,120,255,0.9)' : 'rgba(140,60,220,0.9)'
      ));
    }
  }
  parryCharge(x,y,target){
    for(let i=0; i<15; i++){
      const ang = Math.random()*Math.PI*2;
      const sp = 120 + Math.random()*150;
      this.particles.push(new Particle(
        x, y,
        Math.cos(ang)*sp, Math.sin(ang)*sp,
        0.8, 3.5 + Math.random()*2, true,
        '#fff', target
      ));
    }
  }
  trail(x,y){
    this.particles.push(new Particle(x,y,0,0,0.25,3,true));
  }
  update(dt){
    for(const p of this.particles) p.update(dt);
    this.particles = this.particles.filter(p=>!p.dead);
  }
  draw(ctx,cam){ for(const p of this.particles) p.draw(ctx,cam); }
}

//////////////////////// PLATFORM ////////////////////////
class Platform {
  constructor(x,y,w,h){ this.x=x;this.y=y;this.w=w;this.h=h; }
  draw(ctx, cam, flashPurple = false){
    const sx = this.x-cam.x, sy=this.y-cam.y;
    if (flashPurple) {
      ctx.fillStyle = '#be78ff';
      ctx.shadowColor = '#be78ff';
      ctx.shadowBlur = 18;
    } else {
      ctx.fillStyle = '#e8e8e8';
      ctx.shadowColor = 'rgba(255,255,255,0.25)';
      ctx.shadowBlur = 8;
    }
    ctx.fillRect(sx, sy, this.w, this.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = flashPurple ? '#dcb4ff' : '#fff';
    ctx.fillRect(sx, sy, this.w, 2);
  }
}

//////////////////////// ARROW ////////////////////////
class Arrow {
  constructor(x,y,vx,vy,owner,damage,knockback,charge){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.startX = x; this.startY = y;
    this.owner=owner;
    this.originalOwner=owner;
    this.damage=damage; this.knockback=knockback; this.charge=charge;
    this.dead=false;
    this.trail=[];
    this.life = 4.0;
    this.spawnGrace = 0.05;
  }
  get angle(){ return Math.atan2(this.vy,this.vx); }
  update(dt, game){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>18) this.trail.shift();
    this.vy += 700*dt;
    this.x += this.vx*dt;
    this.y += this.vy*dt;
    this.life -= dt;
    this.spawnGrace -= dt;
    if(this.life<=0) this.dead=true;
    if(this.x<-100||this.x>game.arena.width+100||this.y>game.arena.height+200) this.dead=true;
    
    const dist = Math.hypot(this.x - this.startX, this.y - this.startY);
    const intensity = Math.min(1.0, dist / 1100);
    if (intensity > 0.05) {
      const spawnCount = Math.floor(intensity * 5) + 1;
      for (let s = 0; s < spawnCount; s++) {
        const spd = 60 + Math.random() * 220;
        const ang = Math.random() * Math.PI * 2;
        const life = 0.4 + Math.random() * 0.7;
        const size = 2 + Math.random() * 5 + intensity * 4;
        let col;
        const r = Math.random();
        if (r < 0.3) col = '#fff';
        else if (r < 0.6) col = 'rgba(255, 245, 220, 0.98)';
        else if (r < 0.85) col = 'rgba(255, 210, 100, 0.95)';
        else col = 'rgba(255, 170, 60, 0.9)';
        game.particles.particles.push(new Particle(
          this.x - this.vx * dt * (0.2 + Math.random() * 0.5),
          this.y - this.vy * dt * (0.2 + Math.random() * 0.5),
          Math.cos(ang) * spd - this.vx * 0.08,
          Math.sin(ang) * spd - this.vy * 0.08,
          life,
          size,
          true,
          col
        ));
      }
    }

    for(const p of game.arena.platforms){
      if(this.x>p.x && this.x<p.x+p.w && this.y>p.y && this.y<p.y+p.h+8 && this.vy>=0){
        this.dead=true;
        game.particles.burst(this.x,this.y,6,120,0.3,2);
        break;
      }
    }
  }
  draw(ctx,cam,flashBlack=false){
    const sx=this.x-cam.x, sy=this.y-cam.y;
    const color = flashBlack ? '#000' : '#fff';
    
    const dist = Math.hypot(this.x - this.startX, this.y - this.startY);
    const intensity = Math.min(1.0, dist / 1100);

    ctx.save();
    ctx.translate(sx,sy);
    ctx.rotate(this.angle);
    
    const glow = (this.charge>0.6 || intensity > 0.2) && !flashBlack;
    if(glow){
      ctx.shadowColor = intensity > 0.2 ? 'rgba(255, 230, 150, 0.95)' : '#fff';
      ctx.shadowBlur = 14 + 22 * intensity;
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    const len = 14+this.charge*8;
    ctx.beginPath();
    ctx.moveTo(-len,0);
    ctx.lineTo(len,0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(len,0);
    ctx.lineTo(len-6,-4);
    ctx.lineTo(len-6,4);
    ctx.closePath();
    ctx.fillStyle=color;
    ctx.fill();
    ctx.restore();
    ctx.shadowBlur=0;
    
    for(let i=0;i<this.trail.length;i++){
      const t = this.trail[i];
      const ratio = i/this.trail.length;
      const baseAlpha = flashBlack ? 0.9 : (0.5 + intensity * 0.7);
      ctx.globalAlpha = ratio * baseAlpha;
      
      if (!flashBlack && intensity > 0.15) {
        ctx.fillStyle = `rgba(255, ${255 - Math.round(intensity * 25)}, ${255 - Math.round(intensity * 160)}, 1)`;
        ctx.shadowColor = 'rgba(255, 220, 100, 0.9)';
        ctx.shadowBlur = 8 + intensity * 14;
      } else {
        ctx.fillStyle = color;
        ctx.shadowBlur = 0;
      }
      
      const size = 2.5 + (intensity * 6 * ratio);
      ctx.fillRect(t.x-cam.x-size/2, t.y-cam.y-size/2, size, size);
    }
    ctx.globalAlpha=1;
    ctx.shadowBlur=0;
  }
}

//////////////////////// PLAYER ////////////////////////
class Fighter {
  constructor(x,y,isAI=false){
    this.x=x; this.y=y;
    this.vx=0; this.vy=0;
    this.w=22; this.h=42;
    this.facing=1;
    this.onGround=false;
    this.isAI = isAI;
    this.hp=1000;
    this.maxHp=1000;
    this.maxAirJumps=1;
    this.airJumpsLeft=1;
    this.charging=false;
    this.charge=0;
    this.lastFiredCharge=0;
    this.parrying=false;
    this.parryTimer=0;
    this.parryCooldown=0;
    this.floatActive=false;
    this.floatTime=0;
    this.floatReady=true;
    this.isFlippingCoin=false;
    this.coinFlipTimer=0;
    this.coinHasRolledThisCycle=false;
    this.floatMax=2.2;
    this.invuln=0;
    this.dead=false;
    this.stunned=0;
    this.squash=1; this.squashV=0;
    this.anim = 0;
    this.runCycle=0;
    this.alive=true;
    this.spawnPoint={x,y};
    this.recoveryTimer=0;
    this.comboCount=0;
    this.comboTimer=0;
    this.maxArrows=7;
    this.arrows=7;
    this.arrowRechargeAcc=0;
    this.aimAngle=0;
  }

  rechargeArrows(n){
    this.arrows = Math.min(this.maxArrows, this.arrows + n);
    if(this.arrows >= this.maxArrows) this.arrowRechargeAcc = 0;
  }

  updateAimAngle(opponent){
    if(this.isAI){
      if(this._aiAimAngle !== undefined){
        this.aimAngle = this._aiAimAngle;
      } else {
        const dx = opponent.x - this.x;
        const dy = (opponent.y - opponent.h * 0.6) - (this.y - this.h * 0.6);
        this.aimAngle = Math.atan2(dy, dx);
      }
    } else {
      const dx = this._aimX - this.x;
      const dy = this._aimY - (this.y - this.h * 0.6);
      this.aimAngle = Math.atan2(dy, dx);
    }
  }

  updateArrowRecharge(dt){
    if(this.arrows >= this.maxArrows){
      this.arrowRechargeAcc = 0;
      return;
    }
    const perArrow = 15 / this.maxArrows;
    this.arrowRechargeAcc += dt;
    while(this.arrowRechargeAcc >= perArrow && this.arrows < this.maxArrows){
      this.arrows++;
      this.arrowRechargeAcc -= perArrow;
    }
  }

  inParryRange(arrow){
    if(!this.parrying) return false;
    const shieldX = this.x + this.facing * 32;
    const shieldY = this.y - this.h * 0.55;
    const dx = arrow.x - shieldX;
    const dy = arrow.y - shieldY;
    const dist = Math.hypot(dx, dy);
    if(dist > 78) return false;
    if(this.facing > 0 && dx < -28) return false;
    if(this.facing < 0 && dx > 28) return false;
    return true;
  }

  takeHit(knockback, dir, dmg, attacker, game, arrowVx, arrowVy){
    if(this.invuln>0) return;
    this.hp = Math.max(0, this.hp - Math.round(dmg));
    this.stunned = 0.22;
    this.invuln = 0.65;
    game.shake(14);
    game.hitstop(0.08);
    game.particles.burst(this.x, this.y-this.h*0.5, 22, 220, 0.45, 3);
    audio.hit();

    if(this.isAI) {
      game.playerHitImpactTimer = 0.12;
      game.canvas.style.filter = 'invert(100%)';
    } else {
      game.enemyHitImpactTimer = 0.12;
    }

    if(attacker){
      attacker.comboCount++;
      attacker.comboTimer = 1.8;
    }
    const spd = Math.hypot(arrowVx, arrowVy) || 1;
    const nx = arrowVx / spd, ny = arrowVy / spd;
    const kbForce = 320 + knockback * 38;
    this.vx += nx * kbForce;
    this.vy += ny * kbForce * 0.9 - 80;
    if(this.hp <= 0){
      this.die(game);
    }
  }

  respawn(game){
    const spawns = game.arena.spawnPoints;
    const sp = spawns[Math.floor(Math.random()*spawns.length)];
    this.x = sp.x; this.y = sp.y;
    this.hp = this.maxHp;
    this.invuln = 1.6;
    this.dead=false;
    this.arrows = this.maxArrows;
    this.arrowRechargeAcc = 0;
    audio.respawn();
    game.triggerCountdown();
  }

  // Runs for the local player. Updates physics, input, and state.
  update(dt, game, input, opponent){
    if(this.dead) return;

    if(this.invuln>0) this.invuln -= dt;
    if(this.recoveryTimer>0) this.recoveryTimer -= dt;
    if(this.comboTimer>0){ this.comboTimer-=dt; if(this.comboTimer<=0) this.comboCount=0; }
    this.updateArrowRecharge(dt);
    this.updateAimAngle(opponent);

    if(this.stunned>0){
      this.stunned -= dt;
    }

    const canAct = this.stunned<=0 && this.recoveryTimer<=0;
    const canMove = canAct || this.floatActive;

    let moveDir = 0;
    if(canMove && !this.isAI){
      if(input.keys['KeyA']) moveDir -= 1;
      if(input.keys['KeyD']) moveDir += 1;
    } else if(canMove && this.isAI){
      moveDir = this._aiMoveDir||0;
    }
    if(moveDir!==0) this.facing = moveDir;

    if(this.floatActive){
      const floatAccel = 4800;
      const floatMaxH = 540;
      if(moveDir!==0){
        this.vx += moveDir * floatAccel * dt;
        this.vx = Math.max(-floatMaxH, Math.min(floatMaxH, this.vx));
        this.runCycle += dt*10;
      } else {
        this.vx *= Math.pow(0.82, dt * 60);
      }
    } else {
      const accel = this.onGround ? 3200 : 1860;
      const maxSpeed = 425;
      if(moveDir!==0){
        this.vx += moveDir*accel*dt;
        this.vx = Math.max(-maxSpeed, Math.min(maxSpeed, this.vx));
        this.runCycle += dt*8;
      } else {
        const fr = this.onGround ? 2400 : 800;
        if(this.vx>0) this.vx = Math.max(0, this.vx-fr*dt);
        else if(this.vx<0) this.vx = Math.min(0, this.vx+fr*dt);
      }
    }

    const jumpPressed = this.isAI ? this._aiWantJump : (input.justPressed['Space']);
    if(jumpPressed && canAct){
      if(this.onGround){
        this.vy = -1010;
        this.onGround=false;
        this.airJumpsLeft = this.maxAirJumps;
        audio.jump();
        game.particles.dust(this.x, this.y);
        this.squashV = -0.3;
      } else if(this.airJumpsLeft>0){
        this.vy = -930;
        this.airJumpsLeft--;
        audio.jump();
        this.squashV=-0.3;
      }
    }
    this._aiWantJump=false;

    const floatPressed = this.isAI ? this._aiWantFloat : input.justPressed['KeyE'];
    if(floatPressed && this.floatReady && !this.floatActive){
      this.floatActive=true;
      this.floatTime=this.floatMax;
      this.vx *= 0.42;
      this.vy *= 0.32;
      this.stunned = Math.min(this.stunned, 0.05);
      this.onGround = false;
      game.particles.purpleBurst(this.x, this.y - this.h * 0.45, 8);
    }
    this._aiWantFloat=false;
    if(this.floatActive){
      this.floatTime -= dt;
      if(this.floatTime<=0){
        this.floatActive=false;
        this.floatReady=false;
        this.coinFlipTimer=2.0;
        this.coinHasRolledThisCycle=false;
        this.isFlippingCoin=true;
        if(!this.isAI) {
          const container = document.getElementById('coin-container');
          if (container) {
            container.style.display = 'flex';
            const txt = document.getElementById('coin-text');
            if (txt) {
              txt.textContent = "[ --- ]";
              txt.style.color = '#fff';
              txt.style.textShadow = 'none';
            }
          }
        }
      }
    }

    if(this.floatActive){
      this.vy += 90*dt;
      let vDir=0;
      if(this.isAI){ vDir = this._aiVDir||0; }
      else {
        if(input.keys['KeyW']) vDir -=1;
        if(input.keys['KeyS']) vDir +=1;
      }
      const floatVAccel = 3600;
      const floatMaxV = 520;
      if(vDir!==0){
        this.vy += vDir * floatVAccel * dt;
      } else {
        this.vy *= Math.pow(0.84, dt * 60);
      }
      this.vy = Math.max(-floatMaxV, Math.min(floatMaxV, this.vy));
      if(Math.random()<0.45){
        const ang = Math.random()*Math.PI*2;
        const r = 10+Math.random()*8;
        game.particles.purpleBurst(
          this.x+Math.cos(ang)*r,
          this.y-this.h*0.4+Math.sin(ang)*r*0.5,
          1
        );
      }
    } else {
      this.vy += 1530*dt;
      this.vy = Math.min(this.vy, 1860);
    }

    const downHeld = this.isAI ? this._aiCharging : input.mouse.down;
    const justUp = this.isAI ? this._aiRelease : input.mouse.justUp;
    if(downHeld && canAct && this.parryCooldown<=0 && this.arrows>0){
      if(!this.charging){ this.charging=true; this.charge=0; audio.draw(); }
      this.charge = Math.min(1, this.charge + dt/0.9);
    }
    if((justUp || (!downHeld && this.charging)) ){
      if(this.charging){
        this.fireArrow(game, opponent);
        this.charging=false;
        this.charge=0;
      }
    }
    this._aiRelease=false;

    const rightPressed = this.isAI ? this._aiWantParry : input.mouse.rightJust;
    if(rightPressed && canAct && this.parryCooldown<=0 && !this.charging){
      this.parrying=true;
      this.parryTimer=0.38;
      this.parryCooldown=0.55;
    }
    this._aiWantParry=false;
    if(this.parrying){
      this.parryTimer -= dt;
      if(this.parryTimer<=0){ this.parrying=false; }
    }
    if(this.parryCooldown>0) this.parryCooldown -= dt;

    this.x += this.vx*dt;
    this.y += this.vy*dt;

    this.squashV += (1-this.squash)*20*dt;
    this.squash += this.squashV*dt;
    this.squashV *= 0.85;
    this.squash = Math.max(0.1, Math.min(3.0, this.squash));

    const wasOnGround = this.onGround;
    this.onGround=false;
    for(const p of game.arena.platforms){
      const prevFeetY = this.y - this.vy*dt;
      if(this.x+this.w/2 > p.x && this.x-this.w/2 < p.x+p.w){
        if(this.vy>=0 && prevFeetY <= p.y+1 && this.y >= p.y){
          this.y = p.y;
          if(this.vy>200) { game.particles.dust(this.x,this.y); }
          this.vy=0;
          this.onGround=true;
          this.airJumpsLeft=this.maxAirJumps;
        } else if(this.vy>=0 && wasOnGround && Math.abs(this.y-p.y)<6 && this.y<=p.y+6){
          this.y = p.y;
          this.vy=0;
          this.onGround=true;
          this.airJumpsLeft=this.maxAirJumps;
        }
      }
    }

    if(this.x<10){ this.x=10; this.vx=Math.max(0,this.vx); }
    if(this.x>game.arena.width-10){ this.x=game.arena.width-10; this.vx=Math.min(0,this.vx); }

    const blast = 260;
    if(this.y > game.arena.height+blast || this.x< -blast || this.x>game.arena.width+blast || this.y < -blast*1.4){
      this.die(game);
    }
  }

  // Runs for the remote player. Updates active cooldowns and timers so visual and hit status doesn't get locked.
  updateRemote(dt) {
    if (this.dead) return;
    if (this.invuln > 0) this.invuln -= dt;
    if (this.stunned > 0) this.stunned -= dt;
    if (this.recoveryTimer > 0) this.recoveryTimer -= dt;
    if (this.comboTimer > 0) {
      this.comboTimer -= dt;
      if (this.comboTimer <= 0) this.comboCount = 0;
    }
    if (this.parrying) {
      this.parryTimer -= dt;
      if (this.parryTimer <= 0) this.parrying = false;
    }
    if (this.parryCooldown > 0) this.parryCooldown -= dt;
    
    this.updateArrowRecharge(dt);
  }

  die(game){
    if(this.dead) return;
    this.hp = 0;
    this.dead=true;
    audio.death();
    game.shake(20);
    game.particles.burst(this.x,this.y,30,200,0.7,4);
    game.onDeath(this, true);
  }

  fireArrow(game, opponent){
    if(game.over || this.arrows<=0) return;
    this.arrows--;
    this.lastFiredCharge = this.charge; // Capture the charge before state gets reset in the same frame
    const ang = this.aimAngle;
    const speed = 640 + this.charge*825;
    const vx = Math.cos(ang)*speed;
    const vy = Math.sin(ang)*speed;
    const dmg = 3 + this.charge*14;
    const kb = 14 + this.charge*42;
    const ax = this.x + Math.cos(ang)*20;
    const ay = this.y - this.h*0.6 + Math.sin(ang)*20;
    const arrow = new Arrow(ax,ay,vx,vy,this,dmg,kb,this.charge);
    game.arrows.push(arrow);
    audio.release(this.charge);
    game.particles.burst(ax,ay,6,80,0.2,2);
    this.vx -= Math.cos(ang)*this.charge*60;
  }

  draw(ctx, cam, game, flashBlack=false){
    if(this.dead) return;
    const sx = this.x-cam.x, sy=this.y-cam.y;
    const mainColor = flashBlack ? '#000' : '#fff';
    const shadowColorValue = flashBlack ? 'transparent' : '#fff';

    const isPlayerSelf = !this.isAI && (!game.isMultiplayer || (game.localPlayerIsLeft === (this === game.player)));
    if(isPlayerSelf){
      ctx.save();
      ctx.translate(sx, sy - this.h - 20);
      const bob = Math.sin(performance.now() / 220) * 2;
      ctx.translate(0, bob);
      ctx.fillStyle = mainColor;
      ctx.globalAlpha = 0.9;
      if(!flashBlack) {
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 8;
      }
      ctx.beginPath();
      ctx.moveTo(0, 8);
      ctx.lineTo(-6, -2);
      ctx.lineTo(6, -2);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    ctx.save();
    ctx.translate(sx,sy);
    ctx.scale(this.facing*1, 1);

    if(this.invuln>0 && Math.floor(this.invuln*12)%2===0){
      ctx.globalAlpha = 0.35;
    }

    if(this.floatActive && !flashBlack){
      const time = performance.now()/1000;
      ctx.save();
      const grad = ctx.createRadialGradient(0,-this.h*0.4,2, 0,-this.h*0.4, 36);
      grad.addColorStop(0, 'rgba(190,120,255,0.45)');
      grad.addColorStop(0.5, 'rgba(140,60,220,0.22)');
      grad.addColorStop(1, 'rgba(140,60,220,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0,-this.h*0.4, 36, 0, Math.PI*2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(190,130,255,0.55)';
      ctx.lineWidth = 1.5;
      for(let i=0;i<2;i++){
        ctx.save();
        ctx.translate(0,-this.h*0.4);
        ctx.rotate(time*(i?-2.2:2.6));
        ctx.scale(1, 0.45);
        ctx.beginPath();
        ctx.arc(0,0, 24+i*6, 0, Math.PI*1.5);
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }

    if(!flashBlack) {
      ctx.fillStyle='rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.ellipse(0,4,18,5,0,0,Math.PI*2);
      ctx.fill();
    }

    const sqx = 1/Math.sqrt(this.squash), sqy=this.squash;
    ctx.scale(sqx,sqy);

    ctx.fillStyle = mainColor;
    if(!flashBlack) {
      ctx.shadowColor = shadowColorValue;
      ctx.shadowBlur = this.parrying ? 18 : (this.charging?10+this.charge*14:4);
    } else {
      ctx.shadowBlur = 0;
    }

    const legSwing = this.onGround && Math.abs(this.vx)>20 ? Math.sin(this.runCycle)*6 : 0;
    ctx.fillRect(-7, -18 + (this.onGround? -legSwing*0.3:0), 5, 18);
    ctx.fillRect(2, -18 + (this.onGround? legSwing*0.3:0), 5, 18);

    ctx.fillRect(-9, -this.h+14, 18, 28);

    ctx.beginPath();
    ctx.arc(0, -this.h+6, 9, 0, Math.PI*2);
    ctx.fill();

    if(!this.parrying && !this.charging){
      ctx.shadowBlur=0;
      ctx.strokeStyle=mainColor;
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(8,-this.h+20);
      ctx.lineTo(16,-this.h+30);
      ctx.stroke();
    }

    if(this.parrying){
      ctx.shadowBlur=0;
      ctx.globalAlpha = 0.55;
      ctx.strokeStyle=mainColor;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(10,-this.h+20, 30+Math.sin(performance.now()/30)*3,0,Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha=0.25;
      ctx.beginPath();
      ctx.arc(10,-this.h+20, 48, -0.9, 0.9);
      ctx.stroke();
      ctx.globalAlpha=1;
    }

    ctx.restore();

    if(!this.parrying){
      const bowX = sx + this.facing * 10;
      const bowY = sy - this.h + 22;
      ctx.save();
      ctx.translate(bowX, bowY);
      ctx.rotate(this.aimAngle);
      ctx.strokeStyle = mainColor;
      ctx.lineWidth = 3;
      if(!flashBlack) {
        ctx.shadowColor = shadowColorValue;
        ctx.shadowBlur = this.charging ? 10 + this.charge * 14 : 4;
      } else {
        ctx.shadowBlur = 0;
      }
      ctx.beginPath();
      ctx.arc(0, 0, 12, -1.1, 1.1);
      ctx.stroke();
      if(this.charging){
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-10 - this.charge * 10, 0);
        ctx.lineTo(0, 10);
        ctx.stroke();
      } else {
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(20, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.lineTo(14, -3.5);
        ctx.lineTo(14, 3.5);
        ctx.closePath();
        ctx.fillStyle = mainColor;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    if(isPlayerSelf && !this.dead && !flashBlack) {
      const pipW = 6;
      const pipH = 3;
      const gap = 3;
      const totalW = this.maxArrows * pipW + (this.maxArrows-1) * gap;
      let startX = -totalW / 2;
      ctx.save();
      ctx.translate(sx, sy + 14);
      for(let i=0; i<this.maxArrows; i++) {
        if(i < this.arrows) {
          ctx.fillStyle = '#fff';
          ctx.fillRect(startX + i*(pipW+gap), 0, pipW, pipH);
        } else {
          ctx.strokeStyle = 'rgba(255,255,255,0.2)';
          ctx.lineWidth = 1;
          ctx.strokeRect(startX + i*(pipW+gap), 0, pipW, pipH);
        }
      }
      ctx.restore();
    }
  }
}

//////////////////////// AI CONTROLLER ////////////////////////
class AIController {
  constructor(fighter, roundNumber = 1){
    this.f = fighter;
    this.f.isAI=true;
    this.decisionTimer=0;
    this.dodgeCooldown=0;
    
    this.difficulty = Math.min(1.30, 0.15 + (roundNumber * 0.20));
    
    const styles = ['aggro', 'defensive', 'balanced'];
    this.playstyle = styles[Math.floor(Math.random() * styles.length)];
  }
  update(dt, game, self, opponent){
    if(self.dead) return;
    this.decisionTimer -= dt;
    if(this.dodgeCooldown>0) this.dodgeCooldown -= dt;

    let threateningArrow=null;
    for(const a of game.arrows){
      if(a.owner===self) continue;
      const dx=a.x-self.x, dy=a.y-self.y;
      const dist = Math.hypot(dx,dy);
      const closing = (a.vx*-dx + a.vy*-dy);
      if(dist < (100 + this.difficulty * 60) && closing>0){
        threateningArrow=a; break;
      }
    }

    self._aiWantJump=false;
    self._aiWantFloat=false;
    self._aiCharging=false;
    self._aiRelease=false;
    self._aiWantParry=false;
    self._aiMoveDir = self._aiMoveDir||0;
    self._aiVDir = 0;

    if(self.stunned>0 && self.floatReady && !self.floatActive &&
       (Math.abs(self.vx)>180 || Math.abs(self.vy)>200) && Math.random()<0.55*this.difficulty){
      self._aiWantFloat=true;
    }

    if(threateningArrow && this.dodgeCooldown<=0){
      const dist = Math.hypot(threateningArrow.x-self.x, threateningArrow.y-self.y);
      if(dist<70 && Math.random()<0.45*this.difficulty){
        self._aiWantParry=true;
      } else if(Math.random()<0.7*this.difficulty){
        self._aiWantJump = self.onGround;
        self._aiMoveDir = (self.x < game.arena.width/2)?-1:1;
        if(!self.onGround && self.floatReady && Math.random()<this.difficulty) self._aiWantFloat=true;
      }
      this.dodgeCooldown=0.4;
    }

    if(this.decisionTimer<=0){
      this.decisionTimer = (0.35 / this.difficulty) + Math.random()*0.25;
      const dx = opponent.x-self.x, dy=opponent.y-self.y;
      const dist = Math.hypot(dx,dy);

      if(this.playstyle === 'defensive'){
        if(dist < 320){
          self._aiMoveDir = dx > 0 ? -1 : 1;
        } else if(dist > 550){
          self._aiMoveDir = dx > 0 ? 1 : -1;
        } else {
          self._aiMoveDir = Math.random() < 0.3 ? (dx > 0 ? -1 : 1) : 0;
        }
      } else if(this.playstyle === 'aggro'){
        if(dist > 90){
          self._aiMoveDir = dx > 0 ? 1 : -1;
        } else {
          self._aiMoveDir = Math.random() < 0.2 ? (dx > 0 ? -1 : 1) : 0;
        }
      } else {
        const selfHpRatio = self.hp / self.maxHp;
        if(selfHpRatio < 0.4 && dist < 300) {
          self._aiMoveDir = dx > 0 ? -1 : 1;
        } else {
          if(dist > 220){
            self._aiMoveDir = dx > 0 ? 1 : -1;
          } else if(dist < 100){
            self._aiMoveDir = dx > 0 ? -1 : 1;
          } else {
            self._aiMoveDir = Math.random() < 0.4 ? (dx > 0 ? 1 : -1) : 0;
          }
        }
      }

      if(self.onGround && (Math.random()<0.2*this.difficulty || (dy<-40 && dist<260))){
        self._aiWantJump=true;
      }
      if(opponent.x < 60 || opponent.x > game.arena.width-60){
        self._aiMoveDir = (self.x < opponent.x)?1:-1;
      }

      if(!self.onGround && self.floatReady && dy<-30 && Math.random()<0.4*this.difficulty){
        self._aiWantFloat=true;
      }
    }
    if(self.floatActive){
      self._aiVDir = (opponent.y < self.y)? -1: (opponent.y>self.y+10?1:0);
    }

    const dist = Math.hypot(opponent.x-self.x, opponent.y-self.y);
    if(dist<520 && this.dodgeCooldown<=0 && self.arrows>0){
      if(!self.charging && Math.random()<0.015*this.difficulty){
        self._aiCharging=true;
      }
      if(self.charging){
        const chargeThreshold = this.playstyle === 'aggro' ? 0.4 : 0.65;
        self._aiCharging = self.charge < (chargeThreshold + Math.random()*0.3);
        if(!self._aiCharging){
          const speed = 640+self.charge*825;
          const t = dist/speed;
          
          const errorFactor = Math.max(0, 1.2 - this.difficulty);
          const randomErrorX = (Math.random() - 0.5) * 80 * errorFactor;
          const randomErrorY = (Math.random() - 0.5) * 80 * errorFactor;

          const leadX = opponent.x + opponent.vx*t*0.6 + randomErrorX;
          const leadY = opponent.y - opponent.h*0.6 + opponent.vy*t*0.3 + randomErrorY;
          
          const targetDx = leadX - self.x;
          const targetDy = leadY - (self.y - self.h * 0.6);
          
          self._aiAimAngle = Math.atan2(targetDx, targetDy);
          self._aiRelease=true;
        }
      }
    } else if(self.charging){
      self._aiCharging=false;
      self._aiRelease=true;
      const dx=opponent.x-self.x, dy=opponent.y-self.y;
      self._aiAimAngle=Math.atan2(dy,dx);
    }
  }
}

//////////////////////// ARENA ////////////////////////
class Arena {
  constructor(width,height){
    this.width=width; this.height=height;
    const groundY = height-80;
    this.platforms = [
      new Platform(0, groundY, width, 40),
      new Platform(width*0.18, groundY-150, 140, 16),
      new Platform(width*0.62, groundY-150, 140, 16),
      new Platform(width*0.40, groundY-280, 160, 16),
    ];
    this.spawnPoints = [
      {x:width*0.25, y:groundY-200},
      {x:width*0.75, y:groundY-200},
      {x:width*0.5, y:groundY-320},
      {x:width*0.5, y:groundY-50},
    ];
  }
  draw(ctx,cam,flashPurple=false){
    for(const p of this.platforms) p.draw(ctx,cam,flashPurple);
  }
}

//////////////////////// CAMERA ////////////////////////
class Camera {
  constructor(w,h){
    this.x=0;this.y=0;
    this.w = (w && !isNaN(w)) ? w : 1200;
    this.h = (h && !isNaN(h)) ? h : 800;
    this.shakeAmt=0;
    this.zoom=1;
  }
  follow(p1,p2,arena){
    if (!p1 || !p2 || !arena) return;
    const midX = (p1.x+p2.x)/2;
    const midY = (p1.y+p2.y)/2;
    const dist = Math.hypot(p1.x-p2.x, p1.y-p2.y);
    let targetZoom = Math.max(0.7, Math.min(1, 1 - (dist-300)/1400));
    if (isNaN(targetZoom)) targetZoom = 1;
    this.zoom += (targetZoom-this.zoom)*0.06;
    if (isNaN(this.zoom) || this.zoom <= 0.1) this.zoom = 1;
    
    const viewW = this.w / this.zoom;
    const viewH = this.h / this.zoom;
    let tx = midX - viewW/2;
    let ty = midY - viewH/2 - 40;
    tx = Math.max(-50, Math.min(arena.width-viewW+50, tx));
    ty = Math.max(-150, Math.min(arena.height-viewH+150, ty));
    
    if (!isNaN(tx)) this.x += (tx-this.x)*0.12;
    if (!isNaN(ty)) this.y += (ty-this.y)*0.12;
  }
  shake(amt){ this.shakeAmt = Math.max(this.shakeAmt, amt); }
  apply(ctx){
    let sx=0,sy=0;
    if(this.shakeAmt>0.2){
      sx = (Math.random()-0.5)*this.shakeAmt;
      sy = (Math.random()-0.5)*this.shakeAmt;
      this.shakeAmt *= 0.85;
    } else this.shakeAmt=0;
    return {x:this.x+sx, y:this.y+sy, zoom:this.zoom};
  }
}

//////////////////////// MAIN GAME ////////////////////////
class Game {
  constructor(){
    this.canvas = document.getElementById('c');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', ()=>this.resize());

    this.input = new Input(this.canvas);
    this.particles = new ParticleSystem();
    this.arena = new Arena(1400, 800);
    this.camera = new Camera(this.canvas.width, this.canvas.height);

    this.arrows=[];
    this.over=false;
    this.hitstopTime=0;
    this.fpsTimer=0; this.fpsFrames=0; this.fpsDisplay=0;

    this.totalScore = 0;
    this.roundNumber = 1;
    this.playerParries = 0;
    this.coinFlipFails = 0;
    this.fightTimer = 0;
    this.fightTimerRunning = false;
    this.scoreScreenActive = false;
    this.scoreScreenTimer = 0;
    this.scoreScreenData = null;

    this.countdownActive = false;
    this.countdownVal = 3;
    this.countdownTimer = 0;

    this.playerHitImpactTimer = 0;
    this.enemyHitImpactTimer = 0;
    this.platformPurpleFlashTimer = 0;

    // Multiplayer State
    this.isMultiplayer = false;
    this.isHost = false;
    this.peer = null;
    this.conn = null;
    this.localPlayerIsLeft = true;
    this.localRematchReady = false;
    this.remoteRematchReady = false;

    this.initMenu();
    this.checkJoinURL();

    requestAnimationFrame(t=>this.loop(t));
    this.lastTime=performance.now();

    window.addEventListener('keydown', e=>{
      if(e.code==='KeyR' && !this.isMultiplayer) this.reset();
      if(e.code==='Space' && this.scoreScreenActive) this.nextRound();
      if(e.code==='Space' && this.isMultiplayer && this.over) this.sendRematchReady();
    });
  }

  // Abstraction helpers to cleanly map local/remote fighters
  get localFighter() {
    return this.localPlayerIsLeft ? this.player : this.enemy;
  }
  get remoteFighter() {
    return this.localPlayerIsLeft ? this.enemy : this.player;
  }

  resize(){
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    if(this.camera){ this.camera.w=this.canvas.width; this.camera.h=this.canvas.height; }
  }

  initMenu() {
    document.getElementById('btn-solo').addEventListener('click', () => {
      document.getElementById('menu-overlay').style.display = 'none';
      this.isMultiplayer = false;
      this.isHost = false;
      this.reset();
    });

    document.getElementById('btn-host').addEventListener('click', () => {
      this.setupHost();
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
      const input = document.getElementById('copy-input');
      input.select();
      document.execCommand('copy');
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'COPIED!';
      setTimeout(() => btn.textContent = 'COPY LINK', 1500);
    });
  }

  checkJoinURL() {
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room');
    if (room) {
      document.getElementById('btn-solo').style.display = 'none';
      document.getElementById('btn-host').style.display = 'none';
      this.setupGuest(room);
    }
  }

  setupHost() {
    const status = document.getElementById('lobby-status');
    status.textContent = 'GENERATING LOBBY...';
    
    this.peer = new Peer();
    this.isHost = true;

    this.peer.on('open', (id) => {
      const joinURL = window.location.origin + window.location.pathname + '?room=' + id;
      document.getElementById('copy-input').value = joinURL;
      document.getElementById('copy-box').style.display = 'flex';
      status.textContent = 'SHARE THE LINK BELOW TO BRING IN OPPONENT';
    });

    this.peer.on('connection', (connection) => {
      this.conn = connection;
      this.isMultiplayer = true;
      status.textContent = 'OPPONENT DETECTED. PREPARING MATCH...';
      
      this.localPlayerIsLeft = Math.random() < 0.5;
      
      this.conn.on('open', () => {
        this.conn.send({
          type: 'side_assignment',
          localPlayerIsLeft: !this.localPlayerIsLeft
        });
        setTimeout(() => {
          document.getElementById('menu-overlay').style.display = 'none';
          this.reset();
        }, 1000);
      });

      this.setupNetworkCallbacks();
    });
  }

  setupGuest(roomId) {
    const status = document.getElementById('lobby-status');
    status.textContent = 'CONNECTING TO HOST...';
    
    this.peer = new Peer();
    this.isHost = false;

    this.peer.on('open', () => {
      this.conn = this.peer.connect(roomId);
      this.isMultiplayer = true;
      
      this.conn.on('open', () => {
        status.textContent = 'CONNECTED. LOADING MATCH...';
      });

      this.setupNetworkCallbacks();
    });
  }

  setupNetworkCallbacks() {
    this.conn.on('data', (data) => {
      if (data.type === 'side_assignment') {
        this.localPlayerIsLeft = data.localPlayerIsLeft;
        document.getElementById('menu-overlay').style.display = 'none';
        this.reset();
      }
      else if (data.type === 'sync') {
        const target = this.remoteFighter;
        if (!target) return;

        target.x = data.x;
        target.y = data.y;
        target.vx = data.vx;
        target.vy = data.vy;

        if (!this.isHost) {
          // Check for lethal HP thresholds on sync packets to trigger local match ending routines
          if (this.localFighter.hp > 0 && data.opponentHp <= 0) {
            this.localFighter.die(this);
          } else {
            this.localFighter.hp = data.opponentHp;
          }

          if (this.remoteFighter.hp > 0 && data.hp <= 0) {
            this.remoteFighter.die(this);
          } else {
            this.remoteFighter.hp = data.hp;
          }
        }

        target.facing = data.facing;
        target.aimAngle = data.aimAngle;
        target.charging = data.charging;
        target.charge = data.charge;
        target.parrying = data.parrying;
        target.floatActive = data.floatActive;
        target.arrows = data.arrows;
      }
      else if (data.type === 'hit') {
        if (this.isHost) {
          this.remoteFighter.takeHit(data.knockback, data.dir, data.dmg, null, this, data.vx, data.vy);
        }
      }
      else if (data.type === 'arrow_fire') {
        const origin = this.remoteFighter;
        const arrow = new Arrow(data.x, data.y, data.vx, data.vy, origin, data.dmg, data.kb, data.charge);
        this.arrows.push(arrow);
        audio.release(data.charge);
        this.particles.burst(data.x, data.y, 6, 80, 0.2, 2);
      }
      else if (data.type === 'rematch_ready') {
        this.remoteRematchReady = true;
        this.updateRematchDisplay();
      }
    });

    this.conn.on('close', () => {
      location.href = window.location.origin + window.location.pathname;
    });
  }

  sendRematchReady() {
    if (this.localRematchReady) return;
    this.localRematchReady = true;
    this.conn.send({ type: 'rematch_ready' });
    this.updateRematchDisplay();
  }

  updateRematchDisplay() {
    if (this.localRematchReady && this.remoteRematchReady) {
      this.localRematchReady = false;
      this.remoteRematchReady = false;
      
      if (this.isHost) { 
        this.localPlayerIsLeft = Math.random() < 0.5;
        this.conn.send({
          type: 'side_assignment',
          localPlayerIsLeft: !this.localPlayerIsLeft
        });
        this.reset();
      }
    } else {
      const text = `REMATCH REQUESTED (${(this.localRematchReady?1:0) + (this.remoteRematchReady?1:0)}/2)`;
      document.getElementById('centertext').innerHTML = this.localRematchReady ? `WAITING FOR OPPONENT...<br><span style="font-size:14px;opacity:.6;letter-spacing:3px;">${text}</span>` : `PRESS SPACE TO REMATCH<br><span style="font-size:14px;opacity:.6;letter-spacing:3px;">${text}</span>`;
    }
  }

  reset(){
    this.totalScore = 0;
    this.roundNumber = 1;
    this.playerParries = 0;
    this.coinFlipFails = 0;
    this.fightTimer = 0;
    this.fightTimerRunning = false;
    this.scoreScreenActive = false;
    this.scoreScreenTimer = 0;
    this.scoreScreenData = null;

    this.over=false;
    this.arrows=[];
    this.particles.particles=[];

    const leftX = this.arena.width*0.3;
    const rightX = this.arena.width*0.7;

    if (this.isMultiplayer) {
      this.player = new Fighter(leftX, this.arena.height-80, false);
      this.player.facing = 1;
      this.enemy = new Fighter(rightX, this.arena.height-80, false);
      this.enemy.facing = -1;
      this.aiController = null;
    } else {
      this.player = new Fighter(leftX, this.arena.height-80, false);
      this.player.facing = 1;
      this.enemy = new Fighter(rightX, this.arena.height-80, true);
      this.enemy.facing = -1;
      this.aiController = new AIController(this.enemy, this.roundNumber);
    }

    document.getElementById('center').style.display='none';
    document.getElementById('respawnmsg').style.opacity=0;
    document.getElementById('coin-container').style.display = 'none';
    document.getElementById('score-screen').style.display = 'none';
    this.camera.x = 0; this.camera.y=0; this.camera.zoom=1;
    
    this.playerHitImpactTimer = 0;
    this.enemyHitImpactTimer = 0;
    this.platformPurpleFlashTimer = 0;
    this.canvas.style.filter = 'none';

    this.triggerCountdown();
  }

  nextRound(){
    this.scoreScreenActive = false;
    this.scoreScreenTimer = 0;
    this.scoreScreenData = null;
    document.getElementById('score-screen').style.display = 'none';
    document.getElementById('score-screen').innerHTML = '';
    
    this.roundNumber++;
    this.playerParries = 0;
    this.coinFlipFails = 0;
    this.fightTimer = 0;
    this.fightTimerRunning = false;
    this.over = false;
    this.arrows=[];
    this.particles.particles=[];
    
    this.player = new Fighter(this.arena.width*0.3, this.arena.height-80,false);
    this.player.facing = 1;
    this.enemy = new Fighter(this.arena.width*0.7, this.arena.height-80,true);
    this.enemy.facing = -1;
    this.aiController = new AIController(this.enemy, this.roundNumber);
    
    document.getElementById('center').style.display='none';
    document.getElementById('respawnmsg').style.opacity=0;
    document.getElementById('coin-container').style.display = 'none';
    
    this.playerHitImpactTimer = 0;
    this.enemyHitImpactTimer = 0;
    this.platformPurpleFlashTimer = 0;
    this.canvas.style.filter = 'none';
    
    this.triggerCountdown();
  }

  triggerCountdown() {
    this.countdownActive = true;
    this.countdownVal = 3;
    this.countdownTimer = 0;
    
    const cdEl = document.getElementById('countdown');
    cdEl.textContent = "3";
    cdEl.style.display = 'block';

    const tutBox = document.getElementById('tutorial-box');
    tutBox.style.display = 'block';

    const tutTxt = document.getElementById('tutorial-text');
    tutTxt.textContent = "LEFT CLICK to SHOOT";

    audio.tone(440, 0.15, 'sine', 0.15);
  }

  shake(a){ this.camera.shake(a); }
  hitstop(t){ this.hitstopTime = Math.max(this.hitstopTime, t); }

  onDeath(fighter, finalDeath){
    if(this.scoreScreenActive) return;
    this.over = true;
    this.fightTimerRunning = false;

    if (this.isMultiplayer) {
      const won = !this.localFighter.dead;
      const mainText = won ? "YOU WIN" : "YOU LOSE";
      const subText = "PRESS SPACE TO REQUEST REMATCH";
      document.getElementById('centertext').innerHTML = mainText + '<br><span style="font-size:14px;opacity:.6;letter-spacing:3px;margin-top:10px;display:block;">' + subText + '</span>';
      document.getElementById('center').style.display = 'block';
    } else {
      if(fighter === this.player) {
        const mainText = `YOU SCORED ${Math.round(this.totalScore)} POINTS.`;
        const subText = `TRY AGAIN? (press R to restart)`;
        document.getElementById('centertext').innerHTML = mainText + '<br><span style="font-size:14px;opacity:.6;letter-spacing:3px;margin-top:10px;display:block;">' + subText + '</span>';
        document.getElementById('center').style.display = 'block';
        audio.death();
      } else {
        audio.victory();
        this.startScoreScreen();
      }
    }
  }

  calculateScore() {
    const initialScore = Math.round(this.player.hp);
    const parryCount = this.playerParries;
    const parryMult = Math.pow(1.06, parryCount);
    const timeBonus = Math.max(0, 150 - Math.max(0, this.fightTimer - 10) * 15);
    
    let luckMult = 1.0;
    let luckActive = false;
    if(this.coinFlipFails >= 4) {
      luckMult = 1.0 + Math.min(0.8, (this.coinFlipFails - 3) * 0.1);
      luckActive = true;
    }
    
    let floatMult = 1.0;
    let floatActive = false;
    if(this.player.floatReady) {
      floatMult = 1.3;
      floatActive = true;
    }
    
    let running = initialScore * parryMult;
    running += timeBonus;
    running *= luckMult;
    running *= floatMult;
    const finalScore = Math.round(running);
    
    this.roundScore = finalScore;
    this.totalScore += finalScore;
    
    return {
      initialScore,
      parryCount,
      parryMult,
      timeBonus,
      luckMult,
      luckActive,
      floatMult,
      floatActive,
      finalScore
    };
  }

  startScoreScreen() {
    const d = this.calculateScore();
    this.scoreScreenData = d;
    this.scoreScreenActive = true;
    this.scoreScreenTimer = 0;
    
    const screen = document.getElementById('score-screen');
    screen.style.display = 'flex';
    screen.innerHTML = '';
    
    const title = document.createElement('div');
    title.id = 'score-title';
    title.style.cssText = 'font-size:28px;letter-spacing:6px;margin-bottom:24px;opacity:0;transition:opacity 0.4s;color:#fff;';
    title.textContent = 'ROUND ' + this.roundNumber + ' CLEARED';
    screen.appendChild(title);
    
    const lines = document.createElement('div');
    lines.id = 'score-lines';
    lines.style.cssText = 'text-align:center;';
    screen.appendChild(lines);
    
    const addLine = (id, html, cls) => {
      const div = document.createElement('div');
      div.id = id;
      div.className = 'score-line ' + (cls || '');
      div.style.cssText = 'font-size:14px;letter-spacing:2px;margin:7px 0;opacity:0;transition:opacity 0.35s ease-out;color:#fff;';
      div.innerHTML = html;
      lines.appendChild(div);
      return div;
    };
    
    addLine('score-line-initial', `INITIAL SCORE (HP): <span class="value" style="font-weight:bold;text-shadow:0 0 8px rgba(255,255,255,0.5);">0</span>`);
    
    if(d.parryCount > 0) {
      const multStr = Array(d.parryCount).fill('1,06x').join('');
      addLine('score-line-parry', `${d.parryCount} arrows parried ${multStr} = <span class="value" style="font-weight:bold;color:#be78ff;text-shadow:0 0 10px rgba(190,120,255,0.6);">0</span>`, 'highlight');
    }
    
    addLine('score-line-time', `killing speed ${d.timeBonus.toFixed(0).replace('.',',')} points = <span class="value" style="font-weight:bold;color:#88ff88;text-shadow:0 0 10px rgba(136,255,136,0.4);">0</span>`, 'bonus');
    
    if(d.luckActive) {
      const luckStr = d.luckMult.toFixed(1).replace('.',',');
      addLine('score-line-luck', `down on your luck ${luckStr}x = <span class="value" style="font-weight:bold;color:#be78ff;text-shadow:0 0 10px rgba(190,120,255,0.6);">0</span>`, 'highlight');
    }
    
    if(d.floatActive) {
      addLine('score-line-float', `unused float 1,3x = <span class="value" style="font-weight:bold;color:#be78ff;text-shadow:0 0 10px rgba(190,120,255,0.6);">0</span>`, 'highlight');
    }
    
    const finalLine = document.createElement('div');
    finalLine.id = 'score-line-final';
    finalLine.className = 'score-line';
    finalLine.style.cssText = 'font-size:16px;letter-spacing:3px;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.25);opacity:0;transition:opacity 0.35s ease-out;color:#fff;';
    finalLine.innerHTML = `ROUND TOTAL: <span class="value" style="font-weight:bold;text-shadow:0 0 12px rgba(255,255,255,0.6);font-size:18px;">0</span>`;
    lines.appendChild(finalLine);
    
    const totalLine = document.createElement('div');
    totalLine.id = 'score-line-total';
    totalLine.className = 'score-line';
    totalLine.style.cssText = 'font-size:22px;letter-spacing:4px;margin-top:10px;opacity:0;transition:opacity 0.35s ease-out;color:#fff;';
    totalLine.innerHTML = `TOTAL SCORE: <span class="value" style="font-weight:bold;text-shadow:0 0 15px rgba(255,255,255,0.7);">0</span>`;
    lines.appendChild(totalLine);
    
    const cont = document.createElement('div');
    cont.id = 'score-continue';
    cont.style.cssText = 'font-size:12px;letter-spacing:3px;margin-top:28px;opacity:0;transition:opacity 0.4s;color:#fff;animation:pulse 1.2s infinite;';
    cont.textContent = 'PRESS SPACE TO CONTINUE';
    screen.appendChild(cont);
  }

  updateScoreScreen(dt) {
    this.scoreScreenTimer += dt;
    const t = this.scoreScreenTimer;
    const d = this.scoreScreenData;
    
    const ease = p => 1 - Math.pow(1 - Math.min(1, p), 3);
    
    const show = (id, time) => {
      const el = document.getElementById(id);
      if(el && t >= time) el.style.opacity = 1;
    };
    
    const animate = (id, from, to, start, duration) => {
      const el = document.getElementById(id);
      if(!el) return to;
      if(t < start) { el.style.opacity = 0; return from; }
      el.style.opacity = 1;
      const p = Math.min(1, (t - start) / duration);
      const val = from + (to - from) * ease(p);
      const span = el.querySelector('.value');
      if(span) span.textContent = Math.round(val);
      return to;
    };
    
    let base = 0;
    
    show('score-title', 0.2);
    
    base = animate('score-line-initial', 0, d.initialScore, 0.5, 1.0);
    
    if(d.parryCount > 0) {
      const target = base * d.parryMult;
      base = animate('score-line-parry', base, target, 1.8, 0.8);
    }
    
    const timeStart = 1.8 + (d.parryCount > 0 ? 1.1 : 0);
    const timeTarget = base + d.timeBonus;
    base = animate('score-line-time', base, timeTarget, timeStart, 0.8);
    
    if(d.luckActive) {
      const luckStart = timeStart + 1.1;
      const luckTarget = base * d.luckMult;
      base = animate('score-line-luck', base, luckTarget, luckStart, 0.8);
    }
    
    if(d.floatActive) {
      const floatStart = timeStart + 1.1 + (d.luckActive ? 1.1 : 0);
      const floatTarget = base * d.floatMult;
      base = animate('score-line-float', base, floatTarget, floatStart, 0.8);
    }
    
    const finalStart = timeStart + 1.1 + (d.luckActive ? 1.1 : 0) + (d.floatActive ? 1.1 : 0) + 0.4;
    animate('score-line-final', 0, d.finalScore, finalStart, 1.0);
    
    const totalStart = finalStart + 1.3;
    animate('score-line-total', this.totalScore - d.finalScore, this.totalScore, totalStart, 1.0);
    
    show('score-continue', totalStart + 1.2);
    
    if(t >= totalStart + 1.2 && this.input.justPressed['Space']) {
      this.nextRound();
    }
  }

  checkArrowCollisions(){
    for(const arrow of this.arrows){
      if(arrow.dead) continue;
      for(const f of [this.player, this.enemy]){
        if(f.dead) continue;
        if(arrow.spawnGrace>0 && arrow.owner===f) continue;
        if(arrow.originalOwner===f && arrow.owner===f) continue;
        const dx = arrow.x-f.x, dy=arrow.y-(f.y-f.h*0.5);
        const hitR = 16;
        const bodyHit = Math.abs(dx)<hitR && Math.abs(dy)<hitR+10;
        const parryHit = f.parrying && (bodyHit || f.inParryRange(arrow));
        if(parryHit){
          const reflectDir = f.facing;
          const spd = Math.hypot(arrow.vx, arrow.vy) || 1;
          arrow.vx = reflectDir * spd * 1.35;
          arrow.vy = arrow.vy * -0.85 - 120;
          arrow.owner = f;
          arrow.charge = Math.min(1, arrow.charge+0.25);
          arrow.knockback = Math.min(56, arrow.knockback + 8);
          arrow.spawnGrace = 0.1;
          f.hp = Math.min(1000, f.hp + 100);
          f.rechargeArrows(2);
          audio.parry();
          this.particles.burst(arrow.x,arrow.y,20,180,0.4,3);
          this.particles.purpleBurst(arrow.x, arrow.y, 6);
          this.particles.parryCharge(arrow.x, arrow.y, f);
          this.hitstop(0.1);
          this.shake(8);
          f.parrying=false;
          f.parryTimer=0;
          if(f === this.player) this.playerParries++;
          continue;
        }
        if(bodyHit){
          const dir = arrow.vx>=0?1:-1;
          const dist = Math.hypot(arrow.x - arrow.startX, arrow.y - arrow.startY);
          
          let scaledDmg = 50 + (dist / 1100) * 550;
          scaledDmg = Math.max(50, Math.min(600, scaledDmg));
          
          if (this.isMultiplayer) {
            if (this.isHost) {
              f.takeHit(arrow.knockback, dir, scaledDmg, arrow.owner, this, arrow.vx, arrow.vy);
            } else {
              if (f === this.localFighter) {
                f.takeHit(arrow.knockback, dir, scaledDmg, arrow.owner, this, arrow.vx, arrow.vy);
                this.conn.send({
                  type: 'hit',
                  knockback: arrow.knockback,
                  dir: dir,
                  dmg: scaledDmg,
                  vx: arrow.vx,
                  vy: arrow.vy
                });
              }
            }
          } else {
            f.takeHit(arrow.knockback, dir, scaledDmg, arrow.owner, this, arrow.vx, arrow.vy);
          }
          arrow.dead=true;
        }
      }
    }
    this.arrows = this.arrows.filter(a=>!a.dead);
  }

  updateHUD(){
    document.getElementById('pdmg').textContent = Math.round(this.player.hp) + ' HP';
    document.getElementById('edmg').textContent = Math.round(this.enemy.hp) + ' HP';
    
    const pct = this.localFighter.floatActive ? (this.localFighter.floatTime/this.localFighter.floatMax) : (this.localFighter.floatReady ? 1 : 0);
    document.getElementById('floatfill').style.width = Math.max(0,Math.min(1,pct))*100+'%';
    document.getElementById('ammocount').textContent = this.localFighter.arrows + ' / ' + this.localFighter.maxArrows;
    
    const combo = document.getElementById('combo');
    if(this.localFighter.comboCount>1 && !this.isMultiplayer){
      combo.style.opacity=1;
      combo.textContent = this.localFighter.comboCount+' HIT COMBO';
    } else combo.style.opacity=0;
    
    document.getElementById('game-timer').textContent = 'TIME: ' + this.fightTimer.toFixed(1);
  }

  loop(t){
    requestAnimationFrame(tt=>this.loop(tt));
    let dt = (t-this.lastTime)/1000;
    this.lastTime=t;
    dt = Math.min(dt, 0.033);

    this.fpsFrames++;
    this.fpsTimer += dt;
    if(this.fpsTimer>0.5){
      this.fpsDisplay = Math.round(this.fpsFrames/this.fpsTimer);
      this.fpsTimer=0; this.fpsFrames=0;
      document.getElementById('fps').textContent = this.fpsDisplay+' FPS';
    }

    if(this.scoreScreenActive) {
      this.updateScoreScreen(dt);
      this.render();
      this.input.consumeFrame();
      return;
    }

    if(this.playerHitImpactTimer > 0) {
      this.playerHitImpactTimer -= dt;
      if(this.playerHitImpactTimer <= 0) {
        this.canvas.style.filter = 'none';
      }
    }
    if(this.enemyHitImpactTimer > 0) {
      this.enemyHitImpactTimer -= dt;
    }
    if(this.platformPurpleFlashTimer > 0) {
      this.platformPurpleFlashTimer -= dt;
    }

    if(this.hitstopTime>0){
      this.hitstopTime -= dt;
      dt *= 0.05;
    }

    if(this.player && this.enemy){
      const camView = {x:this.camera.x, y:this.camera.y, zoom:this.camera.zoom};
      this.localFighter._aimX = camView.x + this.input.mouse.x/camView.zoom;
      this.localFighter._aimY = camView.y + this.input.mouse.y/camView.zoom;

      if (!this.over) {
        if(!this.countdownActive) {
          if (this.isMultiplayer) {
            const oldArrows = this.localFighter.arrows;
            
            // Local fighter updates controls, physics, and status timers
            this.localFighter.update(dt, this, this.input, this.remoteFighter);
            
            // Remote opponent updates status timers so states like invuln/stun don't get locked permanently
            this.remoteFighter.updateRemote(dt);
            
            if (this.localFighter.arrows < oldArrows) {
              const firedCharge = this.localFighter.lastFiredCharge;
              const speed = 640 + firedCharge * 825;
              this.conn.send({
                type: 'arrow_fire',
                x: this.localFighter.x + Math.cos(this.localFighter.aimAngle) * 20,
                y: this.localFighter.y - this.localFighter.h * 0.6 + Math.sin(this.localFighter.aimAngle) * 20,
                vx: Math.cos(this.localFighter.aimAngle) * speed,
                vy: Math.sin(this.localFighter.aimAngle) * speed,
                dmg: 3 + firedCharge * 14,
                kb: 14 + firedCharge * 42,
                charge: firedCharge
              });
            }

            if (this.isHost) {
              this.conn.send({
                type: 'sync',
                x: this.localFighter.x,
                y: this.localFighter.y,
                vx: this.localFighter.vx,
                vy: this.localFighter.vy,
                hp: this.localFighter.hp,
                opponentHp: this.remoteFighter.hp,
                facing: this.localFighter.facing,
                aimAngle: this.localFighter.aimAngle,
                charging: this.localFighter.charging,
                charge: this.localFighter.charge,
                parrying: this.localFighter.parrying,
                floatActive: this.localFighter.floatActive,
                arrows: this.localFighter.arrows
              });
            } else {
              this.conn.send({
                type: 'sync',
                x: this.localFighter.x,
                y: this.localFighter.y,
                vx: this.localFighter.vx,
                vy: this.localFighter.vy,
                facing: this.localFighter.facing,
                aimAngle: this.localFighter.aimAngle,
                charging: this.localFighter.charging,
                charge: this.localFighter.charge,
                parrying: this.localFighter.parrying,
                floatActive: this.localFighter.floatActive,
                arrows: this.localFighter.arrows
              });
            }
          } else {
            this.aiController.update(dt, this, this.enemy, this.player);
            this.player.update(dt, this, this.input, this.enemy);
            this.enemy.update(dt, this, this.input, this.player);
          }
          
          if(this.fightTimerRunning) {
            this.fightTimer += dt;
          }
        } else {
          this.player.updateAimAngle(this.enemy);
          this.enemy.updateAimAngle(this.player);

          this.countdownTimer += dt;
          if(this.countdownTimer >= 1.0) {
            this.countdownTimer -= 1.0;
            this.countdownVal--;
            const cdEl = document.getElementById('countdown');
            const tutTxt = document.getElementById('tutorial-text');
            const tutBox = document.getElementById('tutorial-box');

            if(this.countdownVal === 2) {
              cdEl.textContent = "2";
              tutTxt.textContent = "RIGHT CLICK to PARRY. PARRY recharges ARROWS.";
              audio.tone(440, 0.15, 'sine', 0.15);
            } else if(this.countdownVal === 1) {
              cdEl.textContent = "1";
              tutTxt.textContent = "E to FLOAT. COIN FLIP recharges FLOAT.";
              audio.tone(440, 0.15, 'sine', 0.15);
            } else if(this.countdownVal === 0) {
              cdEl.textContent = "FIGHT!";
              tutTxt.textContent = "GOOD LUCK!";
              audio.tone(587.33, 0.4, 'sine', 0.2, 880);
            } else {
              cdEl.style.display = 'none';
              tutBox.style.display = 'none';
              this.countdownActive = false;
              this.fightTimer = 0;
              this.fightTimerRunning = true;
            }
          }
          this.player.vx = 0; this.player.vy = 0;
          this.player.charging = false; this.player.charge = 0;
          this.player.x = this.arena.width * 0.3;
          this.player.y = this.arena.height - 80;

          this.enemy.vx = 0; this.enemy.vy = 0;
          this.enemy.charging = false; this.enemy.charge = 0;
          this.enemy.x = this.arena.width * 0.7;
          this.enemy.y = this.arena.height - 80;
        }
      } else {
        // MATCH IS OVER: Keep running remote timer updates and syncing over the network so state propagation completes cleanly.
        if (this.isMultiplayer) {
          this.localFighter.updateRemote(dt);
          this.remoteFighter.updateRemote(dt);

          if (this.isHost) {
            this.conn.send({
              type: 'sync',
              x: this.localFighter.x,
              y: this.localFighter.y,
              vx: this.localFighter.vx,
              vy: this.localFighter.vy,
              hp: this.localFighter.hp,
              opponentHp: this.remoteFighter.hp,
              facing: this.localFighter.facing,
              aimAngle: this.localFighter.aimAngle,
              charging: this.localFighter.charging,
              charge: this.localFighter.charge,
              parrying: this.localFighter.parrying,
              floatActive: this.localFighter.floatActive,
              arrows: this.localFighter.arrows
            });
          } else {
            this.conn.send({
              type: 'sync',
              x: this.localFighter.x,
              y: this.localFighter.y,
              vx: this.localFighter.vx,
              vy: this.localFighter.vy,
              facing: this.localFighter.facing,
              aimAngle: this.localFighter.aimAngle,
              charging: this.localFighter.charging,
              charge: this.localFighter.charge,
              parrying: this.localFighter.parrying,
              floatActive: this.localFighter.floatActive,
              arrows: this.localFighter.arrows
            });
          }
        }
      }

      // COIN FLIPPING EVALUATION AND ANIMATION SYSTEM
      if (this.localFighter.isFlippingCoin) {
        this.localFighter.coinFlipTimer -= dt;
        const coinGraphic = document.getElementById('coin-graphic');
        
        if (this.localFighter.coinFlipTimer > 1.4) {
          const flicker = Math.floor(performance.now() / 60) % 2 === 0;
          const txt = document.getElementById('coin-text');
          txt.textContent = flicker ? "[ YES ]" : "[  NO  ]";
          txt.style.color = '#fff';
          txt.style.textShadow = '0 0 10px rgba(255,255,255,0.8)';
          
          const angleScale = Math.sin(performance.now() * 0.04);
          if (coinGraphic) {
            coinGraphic.style.transform = 'scaleX(' + angleScale + ')';
            const flickerColor = flicker ? '#be78ff' : '#ff3333';
            coinGraphic.style.background = flickerColor;
            coinGraphic.style.borderColor = flickerColor;
            coinGraphic.style.boxShadow = '0 0 8px ' + flickerColor;
          }
          
          if (Math.floor(performance.now() / 120) % 2 === 0 && Math.random() < 0.2) {
            audio.tone(800 + Math.random()*400, 0.02, 'sine', 0.02);
          }
        } else {
          if (!this.localFighter.coinHasRolledThisCycle) {
            this.localFighter.coinHasRolledThisCycle = true;
            const win = Math.random() < 0.5;
            const txt = document.getElementById('coin-text');
            
            if (coinGraphic) {
              coinGraphic.style.transform = 'scaleX(1)';
            }
            
            if (win) {
              this.localFighter.floatReady = true;
              this.localFighter.isFlippingCoin = false;
              txt.textContent = "[ YES ]";
              txt.style.color = '#be78ff';
              txt.style.textShadow = '0 0 15px #be78ff';
              
              if (coinGraphic) {
                coinGraphic.style.background = '#be78ff';
                coinGraphic.style.borderColor = '#be78ff';
                coinGraphic.style.boxShadow = '0 0 12px #be78ff';
              }
              
              this.platformPurpleFlashTimer = 0.5;
              audio.tone(600, 0.25, 'sine', 0.15, 1200);
              
              setTimeout(() => {
                if (!this.localFighter.isFlippingCoin) {
                  document.getElementById('coin-container').style.display = 'none';
                }
              }, 1500);
            } else {
              txt.textContent = "[  NO  ]";
              txt.style.color = '#ff3333';
              txt.style.textShadow = '0 0 8px rgba(255,51,51,0.5)';
              
              if (coinGraphic) {
                coinGraphic.style.background = '#ff3333';
                coinGraphic.style.borderColor = '#ff3333';
                coinGraphic.style.boxShadow = '0 0 6px #ff3333';
              }
              audio.tone(180, 0.15, 'sawtooth', 0.1);
              this.coinFlipFails++;
            }
          }
        }
        if (this.localFighter.coinFlipTimer <= 0) {
          this.localFighter.coinFlipTimer = 2.0;
          this.localFighter.coinHasRolledThisCycle = false;
        }
      }

      if (this.remoteFighter.isFlippingCoin && !this.isMultiplayer) {
        this.remoteFighter.coinFlipTimer -= dt;
        if (this.remoteFighter.coinFlipTimer <= 0) {
          const win = Math.random() < 0.5;
          if (win) {
            this.remoteFighter.floatReady = true;
            this.remoteFighter.isFlippingCoin = false;
          } else {
            this.remoteFighter.coinFlipTimer = 2.0;
          }
        }
      }

      for(const a of this.arrows) a.update(dt,this);
      this.checkArrowCollisions();

      this.particles.update(dt);
      if (this.player && this.enemy) {
        this.camera.follow(this.player, this.enemy, this.arena);
      }
    }

    this.input.consumeFrame();
    this.render();
    if (this.player && this.enemy) {
      this.updateHUD();
    }
  }

  render(){
    const ctx=this.ctx;
    
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    const w=this.canvas.width || window.innerWidth;
    const h=this.canvas.height || window.innerHeight;
    ctx.clearRect(0,0,w,h);

    const isRedFlash = this.enemyHitImpactTimer > 0;
    const flashPurple = this.platformPurpleFlashTimer > 0;

    if(isRedFlash) {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(0,0,w,h);
    } else {
      const grad = ctx.createRadialGradient(w/2,h*0.4,50, w/2,h*0.4, w*0.8);
      grad.addColorStop(0,'#161616');
      grad.addColorStop(1,'#000000');
      ctx.fillStyle=grad;
      ctx.fillRect(0,0,w,h);
    }

    const cam = this.camera.apply(ctx);
    const zoom = (cam && cam.zoom && !isNaN(cam.zoom) && cam.zoom > 0) ? cam.zoom : 1;
    const camOffset = {
      x: (cam && !isNaN(cam.x)) ? cam.x : 0,
      y: (cam && !isNaN(cam.y)) ? cam.y : 0
    };

    ctx.save();
    ctx.scale(zoom, zoom);

    this.arena.draw(ctx, camOffset, flashPurple);
    this.particles.draw(ctx, camOffset);
    for(const a of this.arrows) a.draw(ctx, camOffset, isRedFlash);
    
    if (this.player && this.enemy) {
      this.player.draw(ctx, camOffset, this, isRedFlash);
      this.enemy.draw(ctx, camOffset, this, isRedFlash);
    }

    ctx.restore();

    ctx.save();
    const barHeight = 24;
    
    const pPct = (this.player && this.player.maxHp) ? Math.max(0, Math.min(1, this.player.hp / this.player.maxHp)) : 1;
    const ePct = (this.enemy && this.enemy.maxHp) ? Math.max(0, Math.min(1, this.enemy.hp / this.enemy.maxHp)) : 1;

    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(w / 2, 0);
    ctx.lineTo(0, barHeight);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(w / 2 * pPct, 0);
    ctx.lineTo(0, barHeight * pPct);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.beginPath();
    ctx.moveTo(w, 0);
    ctx.lineTo(w / 2, 0);
    ctx.lineTo(w, barHeight);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(w, 0);
    ctx.lineTo(w - (w / 2 * ePct), 0);
    ctx.lineTo(w, barHeight * ePct);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    if(!isRedFlash) {
      const vg = ctx.createRadialGradient(w/2,h/2, h*0.3, w/2,h/2, h*0.75);
      vg.addColorStop(0,'rgba(0,0,0,0)');
      vg.addColorStop(1,'rgba(0,0,0,0.55)');
      ctx.fillStyle=vg;
      ctx.fillRect(0,0,w,h);
    }
  }
}

window.addEventListener('load', ()=>{
  new Game();
});
</script>
